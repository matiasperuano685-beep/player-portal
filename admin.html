<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>CapiBet Admin</title>
<link rel="icon" href="/icons/icon-192.png">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --gold: #f59e0b; --gold-light: #fcd34d; --gold-dark: #d97706;
    --bg: #050300; --bg2: #0d0600; --card: #130900; --card2: #1c0e00;
    --border: #2e1800; --border-g: rgba(245,158,11,0.18);
    --text: #fef3c7; --muted: #7a4010;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }

  /* LOGIN */
  #login-screen {
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 24px;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, #2a1200 0%, #050300 65%);
  }
  .login-logo { width: 90px; height: 90px; border-radius: 50%; overflow: hidden; margin-bottom: 12px;
    border: 2px solid transparent;
    background: linear-gradient(var(--bg), var(--bg)) padding-box,
                linear-gradient(145deg, var(--gold), #7c3000, var(--gold)) border-box;
    box-shadow: 0 0 30px rgba(245,158,11,0.2); }
  .login-logo img { width: 100%; height: 100%; object-fit: cover; }
  .login-title { font-family: 'Oswald', sans-serif; font-size: 1.8rem; color: var(--gold); letter-spacing: 0.1em; margin-bottom: 4px; text-shadow: 0 0 20px rgba(245,158,11,0.4); }
  .login-sub { font-size: 0.82rem; color: var(--muted); margin-bottom: 28px; }
  .login-box { background: linear-gradient(160deg,#1c0d00,#110700); border: 1px solid var(--border-g); border-radius: 20px; padding: 28px; width: 100%; max-width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.6); }
  .form-group { margin-bottom: 16px; }
  .form-group label { display: block; font-size: 0.78rem; color: var(--muted); margin-bottom: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; }
  .form-group input { width: 100%; background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 13px 14px; font-size: 0.95rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; }
  .form-group input:focus { border-color: var(--gold-dark); box-shadow: 0 0 0 3px rgba(245,158,11,0.1); }
  .btn-primary { width: 100%; border: none; border-radius: 10px; color: #000; font-size: 1rem; font-weight: 700; padding: 14px; cursor: pointer; transition: all 0.2s; background: linear-gradient(135deg, var(--gold-dark), var(--gold-light)); box-shadow: 0 4px 16px rgba(245,158,11,0.3); }
  .btn-primary:hover { box-shadow: 0 6px 24px rgba(245,158,11,0.5); transform: translateY(-1px); }
  .btn-primary:disabled { background: var(--card2); color: var(--muted); cursor: not-allowed; box-shadow: none; transform: none; }
  .login-error { background: rgba(127,29,29,0.25); border: 1px solid #7f1d1d; border-radius: 8px; color: #fca5a5; font-size: 0.84rem; padding: 10px 14px; margin-bottom: 16px; display: none; }

  /* ADMIN APP */
  #admin-app { display: none; min-height: 100vh; }
  .admin-header {
    background: linear-gradient(180deg,#1a0900,#0d0500);
    padding: 14px 24px; display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--border-g); position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.5);
  }
  .admin-logo { font-family: 'Oswald', sans-serif; font-size: 1.3rem; color: var(--gold); letter-spacing: 0.08em; display: flex; align-items: center; gap: 8px; }
  .admin-logo img { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--gold-dark); }
  .admin-logo span { font-size: 0.72rem; background: var(--gold-dark); color: #000; border-radius: 4px; padding: 2px 6px; font-weight: 700; letter-spacing: 0.04em; }
  .logout-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--muted); padding: 7px 14px; font-size: 0.82rem; cursor: pointer; transition: all 0.15s; }
  .logout-btn:hover { border-color: #7f1d1d; color: #f87171; }

  .admin-body { max-width: 700px; margin: 0 auto; padding: 24px 20px; }

  .section-card {
    background: linear-gradient(160deg,#160b00,#0f0700);
    border: 1px solid var(--border); border-radius: 18px; padding: 22px; margin-bottom: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.4);
  }
  .section-card h2 { font-family: 'Oswald', sans-serif; font-size: 1.05rem; color: var(--gold); letter-spacing: 0.06em; margin-bottom: 18px; padding-bottom: 12px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 8px; }
  .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  @media (max-width: 500px) { .grid-2 { grid-template-columns: 1fr; } }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 0.75rem; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.07em; }
  .field input { background: var(--bg2); border: 1px solid var(--border); border-radius: 10px; color: var(--text); padding: 12px 14px; font-size: 0.92rem; outline: none; transition: border-color 0.2s, box-shadow 0.2s; width: 100%; }
  .field input:focus { border-color: var(--gold-dark); box-shadow: 0 0 0 3px rgba(245,158,11,0.1); }
  .field.full { grid-column: 1 / -1; }
  .save-row { display: flex; align-items: center; gap: 12px; margin-top: 18px; }
  .btn-save { background: linear-gradient(135deg, var(--gold-dark), var(--gold-light)); border: none; border-radius: 10px; color: #000; font-size: 0.92rem; font-weight: 700; padding: 12px 28px; cursor: pointer; transition: all 0.2s; box-shadow: 0 4px 14px rgba(245,158,11,0.3); }
  .btn-save:hover { box-shadow: 0 6px 22px rgba(245,158,11,0.5); transform: translateY(-1px); }
  .btn-save:disabled { background: var(--card2); color: var(--muted); cursor: not-allowed; box-shadow: none; transform: none; }
  .save-msg { font-size: 0.84rem; display: none; }
  .save-msg.ok  { color: #4ade80; }
  .save-msg.err { color: #f87171; }

  .info-note { font-size: 0.78rem; color: var(--muted); margin-top: 10px; line-height: 1.5; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-logo">
    <img src="/icons/icon-512.png" alt="CapiBet" onerror="this.parentNode.innerHTML='🎰'">
  </div>
  <div class="login-title">CAPIBET</div>
  <div class="login-sub">Panel de administración</div>
  <div class="login-box">
    <div class="login-error" id="login-error"></div>
    <div class="form-group">
      <label>Clave de acceso</label>
      <input type="password" id="admin-key" placeholder="••••••••••" onkeydown="if(event.key==='Enter')doLogin()" />
    </div>
    <button class="btn-primary" id="login-btn" onclick="doLogin()">Ingresar</button>
  </div>
</div>

<!-- ADMIN APP -->
<div id="admin-app">
  <div class="admin-header">
    <div class="admin-logo">
      <img src="/icons/icon-512.png" alt="" onerror="this.style.display='none'">
      CAPIBET <span>ADMIN</span>
    </div>
    <button class="logout-btn" onclick="doLogout()">Cerrar sesión</button>
  </div>

  <div class="admin-body">

    <!-- DATOS BANCARIOS -->
    <div class="section-card">
      <h2>🏦 Cuenta bancaria de depósito</h2>
      <div class="grid-2">
        <div class="field">
          <label>Banco</label>
          <input type="text" id="s-bank-name" placeholder="Ej: Mercado Pago, Brubank" />
        </div>
        <div class="field">
          <label>A nombre de</label>
          <input type="text" id="s-bank-account-name" placeholder="Titular de la cuenta" />
        </div>
        <div class="field">
          <label>CBU</label>
          <input type="text" id="s-bank-cbu" placeholder="22 dígitos" maxlength="22" />
        </div>
        <div class="field">
          <label>Alias</label>
          <input type="text" id="s-bank-alias" placeholder="Ej: capibet.mp" />
        </div>
      </div>
      <div class="save-row">
        <button class="btn-save" onclick="saveSettings('bank')">Guardar datos bancarios</button>
        <span class="save-msg" id="bank-msg"></span>
      </div>
      <p class="info-note">Estos datos aparecen en la sección "Cargar saldo" de la app del jugador.</p>
    </div>

    <!-- MONTOS MÍNIMOS -->
    <div class="section-card">
      <h2>💵 Montos mínimos</h2>
      <div class="grid-2">
        <div class="field">
          <label>Mínimo de carga ($)</label>
          <input type="number" id="s-min-deposit" placeholder="Ej: 1000" min="0" />
        </div>
        <div class="field">
          <label>Mínimo de retiro ($)</label>
          <input type="number" id="s-min-withdrawal" placeholder="Ej: 2000" min="0" />
        </div>
      </div>
      <div class="save-row">
        <button class="btn-save" onclick="saveSettings('limits')">Guardar montos</button>
        <span class="save-msg" id="limits-msg"></span>
      </div>
    </div>

    <!-- OTROS -->
    <div class="section-card">
      <h2>⚙️ Configuración general</h2>
      <div class="grid-2">
        <div class="field">
          <label>WhatsApp soporte</label>
          <input type="text" id="s-whatsapp" placeholder="Ej: 5491123456789" />
        </div>
        <div class="field">
          <label>URL del casino</label>
          <input type="text" id="s-casino-url" placeholder="https://capibet.fans/" />
        </div>
      </div>
      <div class="save-row">
        <button class="btn-save" onclick="saveSettings('general')">Guardar configuración</button>
        <span class="save-msg" id="general-msg"></span>
      </div>
    </div>

  </div>
</div>

<script>
const BASE = '';
let operatorKey = '';

function doLogin() {
  const key = document.getElementById('admin-key').value.trim();
  const err = document.getElementById('login-error');
  const btn = document.getElementById('login-btn');
  if (!key) { err.textContent = 'Ingresá la clave'; err.style.display = 'block'; return; }
  btn.disabled = true; btn.textContent = 'Verificando...';
  err.style.display = 'none';
  // Verificar la clave intentando cargar settings
  fetch(BASE + '/api/operator/settings', { headers: { 'x-operator-key': key } })
    .then(r => {
      if (r.status === 403) throw new Error('Clave incorrecta');
      return r.json();
    })
    .then(j => {
      operatorKey = key;
      localStorage.setItem('admin_key', key);
      loadSettings(j.settings);
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-app').style.display = 'block';
    })
    .catch(e => {
      err.textContent = e.message;
      err.style.display = 'block';
    })
    .finally(() => { btn.disabled = false; btn.textContent = 'Ingresar'; });
}

function doLogout() {
  localStorage.removeItem('admin_key');
  operatorKey = '';
  document.getElementById('admin-app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('admin-key').value = '';
}

function loadSettings(s) {
  if (!s) return;
  document.getElementById('s-bank-name').value        = s.bank_name || '';
  document.getElementById('s-bank-account-name').value= s.bank_account_name || '';
  document.getElementById('s-bank-cbu').value         = s.bank_cbu || '';
  document.getElementById('s-bank-alias').value       = s.bank_alias || '';
  document.getElementById('s-min-deposit').value      = s.min_deposit || '';
  document.getElementById('s-min-withdrawal').value   = s.min_withdrawal || '';
  document.getElementById('s-whatsapp').value         = s.whatsapp_number || '';
  document.getElementById('s-casino-url').value       = s.casino_url || '';
}

function getPayload() {
  return {
    bank_name:         document.getElementById('s-bank-name').value.trim(),
    bank_account_name: document.getElementById('s-bank-account-name').value.trim(),
    bank_cbu:          document.getElementById('s-bank-cbu').value.trim(),
    bank_alias:        document.getElementById('s-bank-alias').value.trim(),
    min_deposit:       Number(document.getElementById('s-min-deposit').value) || 0,
    min_withdrawal:    Number(document.getElementById('s-min-withdrawal').value) || 0,
    whatsapp_number:   document.getElementById('s-whatsapp').value.trim(),
    casino_url:        document.getElementById('s-casino-url').value.trim(),
  };
}

async function saveSettings(section) {
  const msgEl = document.getElementById(section + '-msg');
  const btn = event.target;
  btn.disabled = true;
  msgEl.style.display = 'none';
  try {
    const r = await fetch(BASE + '/api/operator/settings', {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json', 'x-operator-key': operatorKey },
      body: JSON.stringify(getPayload())
    });
    const j = await r.json();
    if (j.error) throw new Error(j.error);
    msgEl.textContent = '✅ Guardado';
    msgEl.className = 'save-msg ok';
    msgEl.style.display = 'inline';
    setTimeout(() => msgEl.style.display = 'none', 3000);
  } catch(e) {
    msgEl.textContent = '❌ ' + e.message;
    msgEl.className = 'save-msg err';
    msgEl.style.display = 'inline';
  } finally { btn.disabled = false; }
}

// Auto-login si hay clave guardada
window.addEventListener('DOMContentLoaded', () => {
  const saved = localStorage.getItem('admin_key');
  if (saved) {
    document.getElementById('admin-key').value = saved;
    doLogin();
  }
});
</script>
</body>
</html>
